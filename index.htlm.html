<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body { background: #08090b; font-family: system-ui, -apple-system, sans-serif; color: #f1f5f9; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
  input, select, textarea { font-family: inherit; color: #f1f5f9; }
  input, select, textarea, .field-input, .field-select, .field-textarea { max-width: 100%; box-sizing: border-box; }
  button { font-family: inherit; cursor: pointer; }

  /* Layout */
  #app { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
  html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
  .topbar { height: 60px; background: #101115; border-bottom: 1px solid #1f2130; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
  .layout { display: flex; flex: 1; }
  .sidebar { width: 200px; background: #101115; border-right: 1px solid #1f2130; padding: 16px 10px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
  .page-content { flex: 1; overflow-y: auto; }

  /* Nav button */
  .nav-btn { width: 100%; height: 48px; border-radius: 10px; border: 1px solid #1f2130; background: transparent; color: #94a3b8; display: flex; align-items: center; gap: 12px; padding: 0 14px; cursor: pointer; font-weight: 700; font-size: 13px; transition: all 0.15s; }
  .nav-btn.active { border-color: #3b82f6; background: rgba(59,130,246,0.14); color: #3b82f6; }
  .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.04); }
  .nav-btn svg { flex-shrink: 0; }

  /* Bottom nav mobile */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(68px + env(safe-area-inset-bottom, 0px)); background: #101115; border-top: 1px solid #1f2130; display: flex; align-items: stretch; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0px); }
  .bottom-btn { flex: 1; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #475569; border-top: 2px solid transparent; transition: all 0.15s; font-size: 10px; font-weight: 500; }
  .bottom-btn.active { color: #3b82f6; border-top-color: #3b82f6; }

  /* Cards */
  .card { background: #101115; border: 1px solid #1f2130; border-radius: 14px; }
  .card-sm { background: #101115; border: 1px solid #1f2130; border-radius: 10px; }

  /* Form elements */
  .field-label { font-size: 11px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .field-input { width: 100%; height: 44px; background: #08090b; border: 1px solid #1f2130; border-radius: 8px; color: #f1f5f9; font-size: 14px; outline: none; padding: 0 12px; transition: border-color 0.15s; }
  .field-input:focus { border-color: #3b82f6; }
  .field-textarea { width: 100%; background: #08090b; border: 1px solid #1f2130; border-radius: 8px; color: #f1f5f9; font-size: 14px; outline: none; padding: 10px 12px; min-height: 70px; resize: vertical; }
  .field-select { width: 100%; height: 44px; background: #08090b; border: 1px solid #1f2130; border-radius: 8px; color: #f1f5f9; font-size: 14px; outline: none; padding: 0 36px 0 12px; appearance: none; cursor: pointer; }
  .field-wrap { margin-bottom: 10px; }
  .sel-wrap { position: relative; }
  .sel-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }

  /* Buttons */
  .btn { height: 40px; padding: 0 14px; border-radius: 8px; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 700; font-size: 13px; flex-shrink: 0; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-primary { background: #3b82f6; }
  .btn-ghost { background: transparent; border: 1px solid #1f2130 !important; color: #94a3b8 !important; }
  .btn-danger { background: #ef4444; }
  .btn-success { background: #22c55e; }
  .btn-lg { height: 48px; font-size: 15px; padding: 0 20px; }
  .btn-full { width: 100%; }

  /* Badge */
  .badge { border-radius: 8px; padding: 3px 9px; font-size: 11px; font-weight: 700; white-space: nowrap; }

  /* Sheet overlay */
  .sheet-overlay { position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column; justify-content: flex-end; }
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.8); }
  .sheet-panel { position: relative; background: #101115; border-radius: 20px 20px 0 0; border: 1px solid #1f2130; border-bottom: none; max-height: 92vh; width: 100%; display: flex; flex-direction: column; animation: slideUp 0.25s ease; box-sizing: border-box; }
  .sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid #1f2130; flex-shrink: 0; }
  .sheet-title { font-size: 17px; font-weight: 800; color: #f1f5f9; }
  .sheet-close { background: none; border: none; cursor: pointer; color: #94a3b8; padding: 4px; }
  .sheet-body { overflow-y: auto; padding: 18px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 16px)); flex: 1; box-sizing: border-box; width: 100%; }

  /* Toast */
  .toasts { position: fixed; bottom: 76px; right: 16px; z-index: 500; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast { background: #101115; border-radius: 14px; padding: 11px 16px; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-width: 300px; animation: toastIn 0.25s ease; }
  .toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Avatar */
  .ava { border-radius: 30%; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; overflow: hidden; }

  /* KPI card */
  .kpi-card { background: #101115; border: 1px solid #1f2130; border-radius: 14px; padding: 16px; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; }

  /* Spinner */
  .spin { animation: spin 1s linear infinite; }
  .spinner-wrap { display: flex; align-items: center; justify-content: center; height: 200px; }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; gap: 12px; }
  .empty-icon { width: 56px; height: 56px; background: rgba(59,130,246,0.14); border-radius: 16px; display: flex; align-items: center; justify-content: center; }

  /* Tabs */
  .tab-scroll { display: flex; overflow-x: auto; padding: 0 20px 14px; gap: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tab-scroll::-webkit-scrollbar { display: none; }
  .tab-btn { height: 36px; padding: 0 14px; border-radius: 20px; border: 1px solid #1f2130; background: transparent; color: #94a3b8; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
  .tab-btn.active { border-color: #3b82f6; background: rgba(59,130,246,0.14); color: #3b82f6; }

  /* Search bar */
  .search-wrap { padding: 0 20px 12px; position: relative; }
  .search-icon { position: absolute; left: 32px; top: 50%; transform: translateY(-50%); color: #475569; pointer-events: none; }
  .search-input { width: 100%; height: 48px; background: #101115; border: 1px solid #1f2130; border-radius: 10px; padding: 0 14px 0 40px; color: #f1f5f9; font-size: 14px; outline: none; }

  /* Mobile padding */
  .mob-pb { padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }

  /* Login */
  .login-wrap { min-height: 100vh; background: #08090b; display: flex; }
  .login-hero { flex: 1; background: linear-gradient(160deg,#08090b 0%,#0c1220 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; position: relative; overflow: hidden; }
  .login-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 50%,rgba(59,130,246,0.1) 0%,transparent 65%); pointer-events: none; }
  .login-form { width: 440px; background: #101115; display: flex; flex-direction: column; justify-content: center; padding: 56px 48px; border-left: 1px solid #1f2130; }

  /* Confirm */
  .confirm-text { font-size: 14px; color: #94a3b8; margin-bottom: 24px; line-height: 1.7; }
  .confirm-btns { display: flex; gap: 10px; }

  /* Password toggle */
  .pw-wrap { position: relative; }
  .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #475569; }

  /* QR */
  .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .qr-canvas-wrap { background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #1f2130; }

  /* Detail rows */
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1f2130; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 12px; color: #94a3b8; font-weight: 600; }
  .detail-value { font-size: 13px; color: #f1f5f9; font-weight: 700; }

  @media (max-width: 767px) {
    .login-hero { display: none; }
    .login-form { width: 100%; background: #08090b; padding: 32px 24px; border-left: none; }
    .sidebar { display: none; }
    .page-content { padding-bottom: 72px; }
  }
  @media (min-width: 768px) {
    .bottom-nav { display: none; }
    .toasts { bottom: 20px; }
  }
</style>

        method:'POST',

        },

      });
      if(!r.ok) {
        const txt = await r.text();
        throw new Error('HTTP '+r.status+': '+txt);
      }
      const d = await r.json();

      if(d.access_token) {
        localStorage.setItem('vx_supa_session', JSON.stringify(d));
      }
      return {data: d};
    },
    getSession: async () => {
      const raw = localStorage.getItem('vx_supa_session');
      if(!raw) return {data:{session:null}};
      try { return {data:{session: JSON.parse(raw)}}; } catch(e) { return {data:{session:null}}; }
    },

      localStorage.removeItem('vx_supa_session');
      return {error:null};
    }

<div id="app"></div>

<script>
// ── CONFIG ──
const SUPABASE_URL = "";
const SUPABASE_KEY = "";

// ── TOKENS ──
const C = {
  bg:"#08090b", card:"#101115",
  border:"#1f2130", borderFocus:"#3b82f6",
  blue:"#3b82f6",   blueDim:"rgba(59,130,246,0.14)",
  orange:"#f97316", orangeDim:"rgba(249,115,22,0.14)",
  green:"#22c55e",  greenDim:"rgba(34,197,94,0.12)",
  red:"#ef4444",    redDim:"rgba(239,68,68,0.12)",
  yellow:"#eab308", yellowDim:"rgba(234,179,8,0.12)",
  purple:"#a855f7", purpleDim:"rgba(168,85,247,0.14)",
  text:"#f1f5f9", sub:"#94a3b8", muted:"#475569",
};

// ── UTILS ──
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const fmt = d => new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
const fmtD = d => new Date(d).toLocaleDateString("pt-BR");
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const isMobile = () => window.innerWidth < 768;

// ── LOCAL DB (localStorage — persiste ao fechar a aba) ──
const LS = {
  get:(k,d=[])=>{
    try{
      const v = localStorage.getItem("vx2_"+k);
      return v ? JSON.parse(v) : d;
    }catch{
      return d;
    }
  },
  set:(k,v)=>{
    try{
      localStorage.setItem("vx2_"+k, JSON.stringify(v));
    }catch(e){
      console.warn("localStorage cheio ou bloqueado:", e);
    }
  },
};

function seedDB(){
  if(LS.get("ok",false)) return;
  // App começa limpo — usuário cria a própria conta
  LS.set("usuarios",[]);
  LS.set("ordens",[]);
  LS.set("estoque",[]);
  LS.set("categorias_estoque",["Rolamentos","Fixadores","Lubrificantes","Correias","Mancais","Elétrica","Hidráulica","Outros"]);
  LS.set("ok",true);
}

// ── DATABASE API ──
const wait = ms => new Promise(r => setTimeout(r, ms));
const DB = {
  async login(email,senha){
    await wait(600);
    const u=LS.get("usuarios").find(x=>x.email===email&&x.senha===senha);
    if(!u) throw new Error("Credenciais inválidas");
    if(!u.ativo) throw new Error("Usuário desativado");
    return {...u, senha:undefined};
  },
  async getUsuarios(){
    await wait(150);
    return LS.get("usuarios").map(u=>({...u,senha:undefined}));
  },
  async createUsuario(data){
    await wait(400);
    const rec={...data,id:uid(),ativo:true,avatar:null,created_at:new Date().toISOString()};
    const arr=LS.get("usuarios"); arr.push(rec); LS.set("usuarios",arr);
    return {...rec, senha:undefined};
  },
  async updateUsuario(id,upd){
    await wait(300);
    LS.set("usuarios",LS.get("usuarios").map(u=>u.id===id?{...u,...upd}:u));
  },
  async deleteUsuario(id){
    await wait(300);
    LS.set("usuarios",LS.get("usuarios").filter(u=>u.id!==id));
  },
  async getOrdens(){
    await wait(150);
    return [...LS.get("ordens")].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  },
  async createOrdem(data){
    await wait(400);
    const n=LS.get("ordens").length;
    const rec={...data,id:uid(),numero:`OS-${String(n+1).padStart(3,"0")}`,
      status:data.status||"Planejada",equipe_ids:data.equipe_ids||[],imagens:[],
      created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
    const arr=LS.get("ordens"); arr.unshift(rec); LS.set("ordens",arr); return rec;
  },
  async updateOrdem(id,upd){
    await wait(300);
    const u={...upd,updated_at:new Date().toISOString()};
    LS.set("ordens",LS.get("ordens").map(o=>o.id===id?{...o,...u}:o));
  },
  async deleteOrdem(id){
    await wait(300);
    LS.set("ordens",LS.get("ordens").filter(o=>o.id!==id));
  },
  async uploadImg(ordemId,b64){
    await wait(200);
    LS.set("ordens",LS.get("ordens").map(o=>o.id===ordemId?{...o,imagens:[...(o.imagens||[]),b64]}:o));
  },
  async getEstoque(){
    await wait(150);
    return [...LS.get("estoque")].sort((a,b)=>a.nome.localeCompare(b.nome));
  },
  async createItem(data){
    await wait(400);
    const rec={...data,id:uid(),created_at:new Date().toISOString()};
    const arr=LS.get("estoque"); arr.push(rec); LS.set("estoque",arr); return rec;
  },
  async updateItem(id,upd){
    await wait(250);
    LS.set("estoque",LS.get("estoque").map(i=>i.id===id?{...i,...upd}:i));
  },
  async deleteItem(id){
    await wait(300);
    LS.set("estoque",LS.get("estoque").filter(i=>i.id!==id));
  },
};

const PRIOS = ["Alta","Media","Baixa"];

function getCats(){ const c=LS.get('categorias_estoque',null); return c&&c.length>0?c:CATS_DEFAULT; }

const ROLES_OPT = [{v:"admin",l:"Admin"},{v:"gestor",l:"Gestor"},{v:"tecnico",l:"Técnico"}];
const STATUS_FUNC = [

const ICONS = {
  dashboard: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,

// ── QR CODE (simplified local generator) ──
function qrEncode(text){
  const data=[];
  for(let i=0;i<text.length;i++) data.push(text.charCodeAt(i));
  const GF_EXP=new Uint8Array(512),GF_LOG=new Uint8Array(256);
  let x=1;
  for(let i=0;i<255;i++){GF_EXP[i]=x;GF_LOG[x]=i;x<<=1;if(x&256)x^=285;}
  for(let i=255;i<512;i++) GF_EXP[i]=GF_EXP[i-255];
  const gfMul=(a,b)=>a&&b?GF_EXP[GF_LOG[a]+GF_LOG[b]]:0;
  const gfPoly=(ec)=>{
    let p=[1];
    for(let i=0;i<ec;i++){const q=[1,GF_EXP[i]];const r=new Array(p.length+q.length-1).fill(0);for(let j=0;j<p.length;j++) for(let k=0;k<q.length;k++) r[j+k]^=gfMul(p[j],q[k]);p=r;}
    return p;
  };
  const gfDiv=(msg,gen)=>{const r=[...msg,...new Array(gen.length-1).fill(0)];for(let i=0;i<msg.length;i++){const c=r[i];if(c) for(let j=0;j<gen.length;j++) r[i+j]^=gfMul(gen[j],c);}return r.slice(msg.length);};
  const SIZE=37;
  const bits=[];
  const pushBits=(v,n)=>{for(let i=n-1;i>=0;i--) bits.push((v>>i)&1);};
  pushBits(4,4); pushBits(data.length,8);
  for(const b of data) pushBits(b,8);
  for(let i=0;i<4&&bits.length%8!==0;i++) bits.push(0);
  while(bits.length%8!==0) bits.push(0);
  const pads=[236,17];let pi=0;
  while(bits.length<872){for(let i=0;i<8;i++) bits.push((pads[pi]>>(7-i))&1);pi=(pi+1)%2;}
  const dataBytes=[];
  for(let i=0;i<bits.length;i+=8){let b=0;for(let j=0;j<8;j++) b=(b<<1)|bits[i+j];dataBytes.push(b);}
  const ecGen=gfPoly(18);
  const ec=gfDiv(dataBytes,ecGen);
  const allBytes=[...dataBytes,...ec];
  const M=Array.from({length:SIZE},()=>new Array(SIZE).fill(null));
  const setMod=(r,c,v)=>{if(r>=0&&r<SIZE&&c>=0&&c<SIZE)M[r][c]=v;};
  const isFree=(r,c)=>r>=0&&r<SIZE&&c>=0&&c<SIZE&&M[r][c]===null;
  const finder=(r,c)=>{for(let dr=-1;dr<=7;dr++) for(let dc=-1;dc<=7;dc++){if(dr<0||dr>6||dc<0||dc>6) setMod(r+dr,c+dc,false);else if(dr===0||dr===6||dc===0||dc===6||(dr>=2&&dr<=4&&dc>=2&&dc<=4)) setMod(r+dr,c+dc,true);else setMod(r+dr,c+dc,false);}};
  finder(0,0);finder(0,SIZE-7);finder(SIZE-7,0);
  const align=(r,c)=>{for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){setMod(r+dr,c+dc,dr===0&&dc===0||Math.abs(dr)===2||Math.abs(dc)===2);}};
  align(30,30);
  for(let i=8;i<SIZE-8;i++){if(M[6][i]===null)M[6][i]=(i%2===0);if(M[i][6]===null)M[i][6]=(i%2===0);}
  M[SIZE-8][8]=true;
  const fmtPos=[[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[7,8],[8,8],[8,7],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0]];
  const fmtPos2=[[SIZE-1,8],[SIZE-2,8],[SIZE-3,8],[SIZE-4,8],[SIZE-5,8],[SIZE-6,8],[SIZE-7,8],[8,SIZE-8],[8,SIZE-7],[8,SIZE-6],[8,SIZE-5],[8,SIZE-4],[8,SIZE-3],[8,SIZE-2],[8,SIZE-1]];
  for(const[r,c]of[...fmtPos,...fmtPos2]) if(M[r][c]===null) M[r][c]=false;
  let bi=0,up=true;
  for(let col=SIZE-1;col>=1;col-=2){
    if(col===6) col=5;
    for(let row=0;row<SIZE;row++){
      const r=up?SIZE-1-row:row;
      for(let d=0;d<2;d++){
        const c=col-d;
        if(isFree(r,c)){const bit=bi<allBytes.length*8?((allBytes[Math.floor(bi/8)]>>(7-(bi%8)))&1):0;M[r][c]=((r+c)%2===0)?!bit:!!bit;bi++;}
      }
    }
    up=!up;
  }
  const fmt15=0b011010101011011;
  for(let i=0;i<15;i++){
    const b=(fmt15>>i)&1;
    if(i<6){M[8][i]=!!b;M[i][8]=!!b;}
    else if(i===6){M[8][7]=!!b;M[7][8]=!!b;}
    else if(i<9){M[8][15-i+1]=!!b;M[15-i+1][8]=!!b;}
    else{M[8][SIZE-15+i]=!!b;M[SIZE-15+i][8]=!!b;}
  }
  return {matrix:M,size:SIZE};
}

function renderQR(text, size=200){
  try {
    const {matrix,size:n}=qrEncode(text);
    const cell=size/n;
    let rects='';
    for(let r=0;r<n;r++) for(let c=0;c<n;c++){
      if(matrix[r][c]) rects+=`<rect x="${c*cell}" y="${r*cell}" width="${cell+0.5}" height="${cell+0.5}" fill="#000"/>`;
    }
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="border-radius:10px"><rect width="${size}" height="${size}" fill="#fff"/>${rects}</svg>`;
  } catch(e) {
    return `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:10px">${ICONS.loader}</div>`;
  }
}

// ── BADGE ──
function badgeHTML(v){
  const s=S_MAP[v]||{bg:"rgba(71,85,105,0.3)",c:C.sub};
  return `<span class="badge" style="background:${s.bg};color:${s.c}">${esc(v)}</span>`;

// ── AVATAR ──
function avaHTML(u, size=36){
  if(u?.avatar) return `<img src="${esc(u.avatar)}" style="width:${size}px;height:${size}px;border-radius:${size*0.3}px;object-fit:cover;flex-shrink:0;" alt="">`;
  const ini=(u?.nome||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
  const col=R_COLOR[u?.role]||C.blue;
  return `<div class="ava" style="width:${size}px;height:${size}px;border-radius:${size*0.3}px;background:${col}33;border:1px solid ${col}44;font-size:${size*0.34}px;color:${col};">${esc(ini)}</div>`;
}

// ── TOAST SYSTEM ──
let toasts = [];
function showToast(msg, type="success"){
  const id = uid();
  toasts.push({id,msg,type});
  renderToasts();
  setTimeout(()=>{
    toasts = toasts.filter(t=>t.id!==id);
    renderToasts();
  },3000);
}
function renderToasts(){
  const wrap = document.getElementById('toast-wrap');
  if(!wrap) return;
  wrap.innerHTML = toasts.map(t=>{
    const col = t.type==="error"?C.red : t.type==="warning"?C.yellow : C.green;
    return `<div class="toast" style="border:1px solid ${col}">
      <div class="toast-dot" style="background:${col}"></div>
      <span style="font-size:13px;color:#f1f5f9">${esc(t.msg)}</span>
    </div>`;
  }).join('');
}

let sheetStack = [];
function openSheet(html, title, onClose){
  const id = uid();
  const overlay = document.createElement('div');

      </div>
      <div style="overflow-y:auto;padding:18px 20px 32px;flex:1;width:100%;">${html}</div>
    </div>`;

  // Append to #app so it inherits the correct width inside the iframe
  const root = document.getElementById('app') || document.body;
  root.appendChild(overlay);
  sheetStack.push(id);

  const close = ()=>{
    overlay.remove();
    sheetStack = sheetStack.filter(s=>s!==id);
    if(onClose) onClose();
  };
  overlay.querySelector('.sheet-backdrop').addEventListener('click', close);
  overlay.querySelector('.sheet-close-btn').addEventListener('click', close);
  return {overlay, close, id};
}

// ── LINE CHART (canvas-based) ──
function renderLineChart(canvasId){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const pad={top:16,right:16,bottom:28,left:32};
  const cw=W-pad.left-pad.right, ch=H-pad.top-pad.bottom;
  const vals=LINE_DATA.map(d=>d.v);
  const maxV=Math.max(...vals)+5;
  ctx.clearRect(0,0,W,H);
  // Grid lines
  ctx.strokeStyle='#1f2130'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.top+ch*(i/4);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
  }
  // X labels
  ctx.fillStyle='#475569'; ctx.font='10px system-ui'; ctx.textAlign='center';
  LINE_DATA.forEach((d,i)=>{
    const x=pad.left+(i/(LINE_DATA.length-1))*cw;
    ctx.fillText(d.d, x, H-6);
  });
  // Y labels
  ctx.textAlign='right';
  for(let i=0;i<=4;i++){
    const v=Math.round(maxV*(1-i/4));
    const y=pad.top+ch*(i/4);
    ctx.fillText(v, pad.left-4, y+4);
  }
  // Line gradient
  const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+ch);
  grad.addColorStop(0,'rgba(59,130,246,0.3)');
  grad.addColorStop(1,'rgba(59,130,246,0)');
  // Area fill
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top+ch);
  LINE_DATA.forEach((d,i)=>{
    const x=pad.left+(i/(LINE_DATA.length-1))*cw;
    const y=pad.top+ch*(1-(d.v/maxV));
    i===0 ? ctx.lineTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.left+cw, pad.top+ch);
  ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // Line
  ctx.beginPath(); ctx.strokeStyle='#3b82f6'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  LINE_DATA.forEach((d,i)=>{
    const x=pad.left+(i/(LINE_DATA.length-1))*cw;
    const y=pad.top+ch*(1-(d.v/maxV));
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Dots
  LINE_DATA.forEach((d,i)=>{
    const x=pad.left+(i/(LINE_DATA.length-1))*cw;
    const y=pad.top+ch*(1-(d.v/maxV));
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='#3b82f6'; ctx.fill();
    ctx.strokeStyle='#08090b'; ctx.lineWidth=2; ctx.stroke();
  });
}

// ── PIE CHART (canvas-based) ──
function renderPieChart(canvasId, data){
  const canvas = document.getElementById(canvasId);
  if(!canvas||!data.length) return;
  const ctx=canvas.getContext('2d');
  const cx=50,cy=50,r=42,ri=25;
  ctx.clearRect(0,0,100,100);
  let angle=-Math.PI/2;
  const total=data.reduce((s,d)=>s+d.v,0);
  data.forEach(d=>{
    const slice=(d.v/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath(); ctx.fillStyle=d.c; ctx.fill();
    angle+=slice;
  });
  ctx.beginPath(); ctx.arc(cx,cy,ri,0,Math.PI*2);
  ctx.fillStyle='#101115'; ctx.fill();
}

function fieldHTML(label, id, value, type='text', placeholder='', req=false, rows=0){
  const labelHTML = label ? `<div class="field-label">${esc(label)}${req?' *':''}</div>` : '';
  if(rows){
    return `<div class="field-wrap">${labelHTML}<textarea class="field-textarea" id="${id}" placeholder="${esc(placeholder)}" rows="${rows}">${esc(value)}</textarea></div>`;
  }
  if(type==='password'){
    return `<div class="field-wrap">${labelHTML}
      <div class="pw-wrap">
        <input class="field-input" id="${id}" type="password" value="${esc(value)}" placeholder="${esc(placeholder)}" style="padding:0 44px 0 14px">
        <button class="pw-toggle" onclick="togglePw('${id}',this)">${ICONS.eyeOff}</button>
      </div></div>`;
  }
  return `<div class="field-wrap">${labelHTML}<input class="field-input" id="${id}" type="${type}" value="${esc(value)}" placeholder="${esc(placeholder)}"></div>`;
}
function togglePw(id, btn){
  const inp=document.getElementById(id);
  if(!inp) return;
  if(inp.type==='password'){inp.type='text';btn.innerHTML=ICONS.eye;}
  else{inp.type='password';btn.innerHTML=ICONS.eyeOff;}
}

function selHTML(label, id, value, opts){
  const labelHTML = label ? `<div class="field-label">${esc(label)}</div>` : '';
  const options = opts.map(o=>{

    const l = typeof o==='object' ? o.l : o;
    return `<option value="${esc(v)}" ${v===value?'selected':''}>${esc(l)}</option>`;
  }).join('');
  return `<div class="field-wrap">${labelHTML}
    <div class="sel-wrap">

function conhecimentoView(id){
  const k = LS.get('conhecimento',[]).find(x=>x.id===id);
  if(!k) return;
  const cat = CONHECIMENTO_CATS.find(c=>c.v===k.categoria)||{l:'📌 Outros',c:'#94a3b8'};
  const prioColors = {Alta:C.red, Media:C.yellow, Baixa:C.green};
  const pCol = prioColors[k.prioridade]||C.blue;
  const linhas = (k.conteudo||'').split('\n').filter(l=>l.trim());

  const html = `<div>
    <!-- Badges -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      <span style="font-size:11px;background:${cat.c}22;color:${cat.c};border-radius:7px;padding:3px 10px;font-weight:700">${cat.l}</span>
      <span style="font-size:11px;background:${pCol}22;color:${pCol};border-radius:7px;padding:3px 10px;font-weight:700">Prioridade ${k.prioridade}</span>
    </div>

    <!-- Conteúdo como lista numerada interativa -->
    <div style="display:flex;flex-direction:column;gap:8px" id="kb-steps">
      ${linhas.map((linha, i)=>{
        const texto = linha.replace(/^\d+\.\s*/,'').trim();
        if(!texto) return '';
        return `<div id="kbs-${i}" onclick="kbToggleStep(${i})" style="display:flex;align-items:flex-start;gap:12px;background:#08090b;border-radius:12px;padding:12px 14px;cursor:pointer;border:1.5px solid #1f2130;transition:all 0.15s">
          <div style="width:26px;height:26px;border-radius:8px;background:#101115;border:2px solid #1f2130;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;color:#475569;transition:all 0.15s" id="kbs-num-${i}">${i+1}</div>
          <div style="font-size:13px;color:#f1f5f9;line-height:1.6;flex:1;padding-top:3px" id="kbs-txt-${i}">${esc(texto)}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Tags -->
    ${(k.tags||[]).length>0?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:16px">
      ${k.tags.map(t=>`<span style="font-size:11px;background:#101115;color:#475569;border-radius:6px;padding:3px 9px;border:1px solid #1f2130">#${esc(t)}</span>`).join('')}
    </div>`:''}

    <!-- Meta -->
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid #1f2130;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:11px;color:#475569">Por <strong style="color:#94a3b8">${esc(k.autor||'—')}</strong></div>
      <div style="font-size:11px;color:#475569">${fmtD(k.created_at)}</div>
    </div>
  </div>`;

  openSheet(html, k.titulo);
}

function kbToggleStep(i){
  const box   = document.getElementById(`kbs-${i}`);
  const num   = document.getElementById(`kbs-num-${i}`);
  const txt   = document.getElementById(`kbs-txt-${i}`);
  if(!box) return;
  const done = box.dataset.done==='1';
  box.dataset.done = done?'0':'1';
  box.style.borderColor   = done ? '#1f2130'  : C.green;
  box.style.background    = done ? '#08090b'  : C.green+'11';
  num.style.background    = done ? '#101115'  : C.green+'33';
  num.style.borderColor   = done ? '#1f2130'  : C.green;
  num.style.color         = done ? '#475569'  : C.green;
  num.innerHTML           = done ? String(i+1): ICONS.check.replace('width="10"','width="12"').replace('stroke="currentColor"','stroke="'+C.green+'"');
  txt.style.color         = done ? '#f1f5f9'  : '#475569';
  txt.style.textDecoration= done ? 'none'     : 'line-through';
}

    const tagsRaw = document.getElementById('kb-tags')?.value||'';

    if(pc) renderConhecimentoList(pc);
  });
}

async function doSignup() {
  const nome = document.getElementById('signup-nome').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const senha = document.getElementById('signup-senha').value;
  const btn = document.getElementById('signup-btn');
  const err = document.getElementById('signup-error');
  const suc = document.getElementById('signup-success');

  err.style.display = 'none';
  suc.style.display = 'none';

  if (!nome || !email || !senha) { err.style.display='block'; err.textContent='Preencha todos os campos.'; return; }
  if (senha.length < 6) { err.style.display='block'; err.textContent='Senha precisa ter pelo menos 6 caracteres.'; return; }

  btn.disabled = true;
  btn.textContent = 'Criando conta...';

  try {
    const { data, error } = await window._vxSupa.auth.signUp({
      email, password: senha,
      options: { data: { full_name: nome, cargo: 'Administrador', role: 'admin' } }
    });
    if (error) throw error;

    // Guarda perfil local também (cache rápido neste dispositivo)
    const users = LS.get('usuarios') || [];
    if (!users.find(u => u.email === email)) {
      users.push({id: data.user?.id || uid(), nome, email, senha, role:'admin', ativo:true, avatar:null, telefone:'', cargo:'Administrador', matricula:'USR-'+Date.now(), created_at:new Date().toISOString()});
      LS.set('usuarios', users);
    }
    appUser = {id: data.user?.id || uid(), nome, email, role:'admin', ativo:true, avatar:null};
    renderApp();
  } catch(e) {
    err.style.display = 'block';
    const msg = (e.message||'').toLowerCase();
    if (msg.includes('already') || msg.includes('registered') || msg.includes('existe')) {
      err.textContent = 'Este e-mail já está cadastrado. Tente entrar.';
    } else if (msg.includes('load failed') || msg.includes('fetch') || msg.includes('network')) {
      err.textContent = 'Sem conexão com o servidor. Verifique sua internet e tente novamente.';
    } else {
      err.textContent = 'Erro: ' + (e.message || 'tente novamente.');
    }
    console.error('signup error:', e);
    btn.disabled = false;
    btn.textContent = 'Criar conta grátis';
  }
}

async function doEmailLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');

  if (!email || !senha) {
    err.style.display = 'block';
    err.textContent = 'Preencha e-mail e senha.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  err.style.display = 'none';

  try {
    const { data, error } = await window._vxSupa.auth.signInWithPassword({ email, password: senha });
    if (error) throw error;
    const meta = data.user?.user_metadata || {};
    appUser = {
      id: data.user?.id,
      nome: meta.full_name || email.split('@')[0],
      email,
      role: meta.role || 'admin',
      ativo: true,
      avatar: null,
      cargo: meta.cargo || 'Administrador'
    };
    // Cache local pra acesso rápido offline depois
    const users = LS.get('usuarios') || [];
    if (!users.find(u => u.email === email)) {
      users.push({...appUser, senha, matricula:'USR-'+Date.now(), created_at:new Date().toISOString()});
      LS.set('usuarios', users);
    }
    renderApp();
  } catch(e) {
    const msg = (e.message||'').toLowerCase();
    // Fallback to local DB (modo offline)
    try {
      const user = await DB.login(email, senha);
      appUser = user;
      renderApp();
      return;
    } catch(e2) {
      err.style.display = 'block';
      if (msg.includes('load failed') || msg.includes('fetch') || msg.includes('network')) {
        err.textContent = 'Sem conexão com o servidor.';
      } else {
        err.textContent = 'E-mail ou senha incorretos.';
      }
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }
}

}

function selectRole(role){
  selectedRole = role;
  const chosen = ROLE_OPTIONS.find(r => r.role === role);

  // Update all cards visually
  ROLE_OPTIONS.forEach(r => {
    const card = document.getElementById('role-card-' + r.role);
    const mark = document.getElementById('role-checkmark-' + r.role);
    if(!card) return;
    card.classList.toggle('selected', r.role === role);
    if(mark) mark.style.display = r.role === role ? 'block' : 'none';
  });

  // Update enter button color and enable it
  const btn = document.getElementById('enter-btn');
  if(btn && chosen){
    btn.disabled = false;
    btn.style.background = chosen.color;
  }
}

async function doRoleLogin(){
  if(!selectedRole) return;

}

let osState = { ordens:[], usuarios:[], filtro:'Todas', busca:'', saving:false };

async function renderOSPage(container){
  const [ordens, usuarios] = await Promise.all([DB.getOrdens(), DB.getUsuarios()]);

function osFilter(tab){

function calcHoras(ini, fim){
  if(!ini||!fim) return '—';
  const [ih,im]=ini.split(':').map(Number);
  const [fh,fm]=fim.split(':').map(Number);
  let mins=(fh*60+fm)-(ih*60+im);
  if(mins<0) mins+=1440;
  const h=Math.floor(mins/60), m=mins%60;
  return `${h}h${m>0?m+'m':''}`;
}

async function osToggleCheck(osId, idx){
  const os = osState.ordens.find(o=>o.id===osId);
  if(!os) return;
  const chk = [...(os.checklist||[])];
  if(chk[idx]) chk[idx]={...chk[idx],feito:!chk[idx].feito};
  await DB.updateOrdem(osId,{checklist:chk});
  // Update UI inline
  const btn = document.querySelectorAll('#chklist-wrap button')[idx];
  if(btn){
    btn.style.borderColor = chk[idx].feito ? C.green : '#334155';
    btn.style.background = chk[idx].feito ? C.green+'22' : 'transparent';
    btn.innerHTML = chk[idx].feito ? ICONS.check.replace('width="10"','width="12"').replace('stroke="currentColor"','stroke="'+C.green+'"') : '';
    const span = btn.nextElementSibling;
    if(span){
      span.style.color = chk[idx].feito ? '#475569' : '#f1f5f9';
      span.style.textDecoration = chk[idx].feito ? 'line-through' : 'none';
    }
  }
  osState.ordens = osState.ordens.map(o=>o.id===osId?{...o,checklist:chk}:o);
  // Update progress counter
  const done = chk.filter(c=>c.feito).length;
  const prog = document.querySelector('#chklist-wrap')?.previousElementSibling?.querySelector('div:last-child');
  if(prog) prog.textContent = `${done}/${chk.length} concluídos`;
}

async function adicionarPeca(osId){
  const sel = document.getElementById('det-peca-sel');
  const qtdEl = document.getElementById('det-peca-qtd');
  const itemId = sel?.value;
  const qtd = parseInt(qtdEl?.value)||1;
  if(!itemId){ showToast('Selecione um item','error'); return; }
  const estoque = LS.get('estoque');
  const item = estoque.find(e=>e.id===itemId);
  if(!item){ showToast('Item não encontrado','error'); return; }
  if(item.quantidade < qtd){ showToast(`Estoque insuficiente (${item.quantidade} ${item.unidade})`, 'error'); return; }
  // Descontar do estoque
  const novaQtd = item.quantidade - qtd;
  await DB.updateItem(itemId, {quantidade: novaQtd});
  if(novaQtd <= item.minimo){
    addBellNotification(`⚠ Estoque baixo: ${item.nome} — ${novaQtd} ${item.unidade} (mín. ${item.minimo})`);
  }
  // Registrar na OS
  const os = osState.ordens.find(o=>o.id===osId);
  const pecas = [...(os?.pecas||[]), {item_id:itemId, nome:item.nome, qtd, unidade:item.unidade}];
  await DB.updateOrdem(osId, {pecas});
  showToast(`${item.nome} — ${qtd} ${item.unidade} descontado do estoque ✓`);
  // Refresh list inline
  const lista = document.getElementById('det-pecas-list');
  if(lista){
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:8px;background:#08090b;border-radius:8px;padding:8px 12px';
    div.innerHTML=`<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#f1f5f9">${esc(item.nome)}</div><div style="font-size:11px;color:#475569">${qtd} ${esc(item.unidade)}</div></div>`;
    lista.appendChild(div);
  }
  // Update option text
  const opt = sel?.querySelector(`option[value="${itemId}"]`);
  if(opt) opt.textContent = `${item.nome} (${novaQtd} ${item.unidade})`;
  if(qtdEl) qtdEl.value='1';
  await reloadOS();
  await reloadEstoque();
}

function osQRById(id){
  const os = osState.ordens.find(o=>o.id===id);
  if(os) osQR(id);
}

function osQR(id){
  const os = osState.ordens.find(o=>o.id===id);
  if(!os) return;
  const qrText = `VEXOR|${os.numero}|${os.status}|${os.titulo.slice(0,40)}`;
  const url = window.location.href.split('#')[0] + '#os=' + encodeOS(os, osState.usuarios);
  let copied = false;
  const html = `<div style="display:flex;flex-direction:column;gap:18px">
    <div style="background:#08090b;border-radius:10px;padding:12px 14px">
      <div style="font-size:15px;font-weight:800;color:#f1f5f9;margin-bottom:6px">${esc(os.titulo)}</div>
      <div style="display:flex;gap:8px">${badgeHTML(os.prioridade)}${badgeHTML(os.status)}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em">Aponte a câmera para abrir a OS</div>
      <div style="background:#fff;border-radius:16px;padding:16px;border:1px solid #1f2130">${renderQR(qrText,200)}</div>
      <div style="font-size:11px;color:#475569">Abre sem precisar de login ✓</div>
    </div>
    <div style="background:#08090b;border-radius:10px;padding:10px 12px;font-size:11px;color:#475569;font-family:monospace;word-break:break-all;line-height:1.6">
      <div style="color:#94a3b8;font-weight:600;margin-bottom:4px">Dados no QR:</div>${esc(qrText)}
    </div>
    <div style="display:flex;gap:10px">
      <button id="qr-copy-btn" style="flex:1;height:38px;background:#08090b;border:1px solid #1f2130;border-radius:10px;color:#94a3b8;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s">
        ${ICONS.copy} Copiar link
      </button>
      <button id="qr-share-btn" style="flex:1;height:38px;background:${C.blueDim};border:1px solid ${C.blue}33;border-radius:10px;color:${C.blue};font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        ${ICONS.share} Compartilhar
      </button>
    </div>
  </div>`;
  const sh = openSheet(html, `QR Code — ${os.numero}`);
  const copyBtn = sh.overlay.querySelector('#qr-copy-btn');
  copyBtn?.addEventListener('click', ()=>{
    navigator.clipboard?.writeText(url).catch(()=>{
      const el=document.createElement('textarea');el.value=url;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
    });
    copyBtn.innerHTML = `${ICONS.copyDone} Copiado!`;
    copyBtn.style.background = C.greenDim;
    copyBtn.style.borderColor = C.green + '44';
    copyBtn.style.color = C.green;
    setTimeout(()=>{
      copyBtn.innerHTML = `${ICONS.copy} Copiar link`;
      copyBtn.style.background='#08090b';copyBtn.style.borderColor='#1f2130';copyBtn.style.color='#94a3b8';
    }, 2200);
  });
  sh.overlay.querySelector('#qr-share-btn')?.addEventListener('click', ()=>{
    if(navigator.share){ navigator.share({title:`OS ${os.numero}`,text:os.titulo,url}).catch(()=>{}); }
    else copyBtn?.click();
  });
}

function encodeOS(os, usuarios){
  const eq=(os.equipe_ids||[]).map(id=>{
    const u=usuarios.find(u=>u.id===id);
    return u?{nome:u.nome,cargo:u.cargo||u.role}:null;
  }).filter(Boolean);
  const p={n:os.numero,t:os.titulo,d:os.descricao||"",p:os.prioridade,s:os.status,e:eq,c:os.created_at,u:os.updated_at};
  try {
    return btoa(unescape(encodeURIComponent(JSON.stringify(p))));
  } catch(e) {
    return btoa(encodeURIComponent(JSON.stringify(p)));
  }
}

async function osUpdateStatus(id, status){
  await DB.updateOrdem(id, {status});
  showToast(`Status: ${status} ✓`);
  await reloadOS();
}

async function reloadOS(){
  const [ordens, usuarios] = await Promise.all([DB.getOrdens(), DB.getUsuarios()]);
  osState.ordens = ordens;
  osState.usuarios = usuarios;
  const container = document.getElementById('page-content');
  if(container && appPage==='os') renderOSList(container, ['admin','gestor'].includes(appUser.role), appUser.role==='admin');
}

let _osFormEquipe = [];
let _osFormSaveCallback = null;
let _osFormTipo = 'Corretiva';
let _osChecklistCount = 0;

function setupOSForm(overlay, init, onSave){
  _osFormEquipe = [...(init?.equipe_ids||[])];
  _osFormTipo = init?.tipo||'Corretiva';
  _osChecklistCount = (init?.checklist||[]).length;
  _osFormSaveCallback = onSave;
  updateOSTeamLabel();
}

function osTipoSelect(tipo){
  _osFormTipo = tipo;
  const tipoColors = {Preventiva:C.blue, Corretiva:C.red, Preditiva:C.purple, Melhoria:C.green};
  document.querySelectorAll('[data-tipo]').forEach(btn=>{
    const t = btn.getAttribute('data-tipo');
    const sel = t===tipo;
    const col = tipoColors[t]||C.blue;
    btn.style.background = sel ? col+'22' : 'transparent';
    btn.style.borderColor = sel ? col : '#1f2130';
    btn.style.color = sel ? col : '#94a3b8';
  });
}

function addChecklistItem(){
  const list = document.getElementById('osf-checklist');
  if(!list) return;
  const i = _osChecklistCount++;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:8px';
  row.id = `chk-row-${i}`;
  row.innerHTML = `
    <input class="field-input" style="flex:1;height:36px" placeholder="Item do checklist" id="chk-${i}">
    <button type="button" onclick="removeChecklistItem(${i})" style="width:32px;height:32px;border-radius:8px;border:1px solid #1f2130;background:transparent;color:${C.red};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ICONS.x.replace('width="20"','width="14"').replace('height="20"','height="14"')}</button>`;
  list.appendChild(row);
  document.getElementById(`chk-${i}`)?.focus();
}

function removeChecklistItem(i){
  document.getElementById(`chk-row-${i}`)?.remove();
}

function osToggleTeam(uid){
  const idx = _osFormEquipe.indexOf(uid);
  if(idx>=0) _osFormEquipe.splice(idx,1);
  else _osFormEquipe.push(uid);
  const ativos = osState.usuarios.filter(u=>u.ativo!==false);
  document.querySelectorAll('[data-uid]').forEach(btn=>{
    const id = btn.getAttribute('data-uid');
    const sel = _osFormEquipe.includes(id);
    const u = ativos.find(x=>x.id===id);
    const col = R_COLOR[u?.role]||C.blue;
    btn.style.background = sel ? col+'33' : '#08090b';
    btn.style.borderColor = sel ? col : '#1f2130';
    btn.style.color = sel ? col : C.muted;
    const checkEl = btn.querySelector('div[style*="border-radius:50%"]');
    if(sel && !checkEl){
      const d=document.createElement('div');
      d.style.cssText=`position:absolute;bottom:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center`;
      d.innerHTML=ICONS.check; btn.appendChild(d);
    } else if(!sel && checkEl){ checkEl.remove(); }
    const label = btn.parentElement?.querySelector('span');
    if(label) label.style.color = sel ? '#f1f5f9' : '#475569';
  });
  updateOSTeamLabel();
}

function updateOSTeamLabel(){
  const lbl = document.getElementById('osf-team-label');
  if(lbl) lbl.textContent = `Equipe (${_osFormEquipe.length} selecionado${_osFormEquipe.length!==1?'s':''}) — toque para adicionar`;
}

function saveOSForm(){
  const titulo = document.getElementById('osf-titulo')?.value?.trim()||'';
  if(titulo.length<=2){ showToast('Título muito curto','error'); return; }
  // Collect checklist items
  const checklist = [];
  document.querySelectorAll('[id^="chk-"]').forEach(inp=>{
    if(inp.tagName==='INPUT'){
      const txt = inp.value.trim();
      if(txt) checklist.push({texto:txt, feito:false});
    }
  });
  const form = {
    titulo,
    descricao: document.getElementById('osf-desc')?.value||'',
    prioridade: document.getElementById('osf-prio')?.value||'Alta',
    status: document.getElementById('osf-status')?.value||'Planejada',
    tipo: _osFormTipo,
    localizacao: document.getElementById('osf-loc')?.value||'',
    data_execucao: document.getElementById('osf-exec')?.value||'',
    prazo_final: document.getElementById('osf-prazo')?.value||'',
    terceiros: document.getElementById('osf-terc')?.value||'',
    equipe_ids: [..._osFormEquipe],
    checklist,
  };
  if(_osFormSaveCallback){ _osFormSaveCallback(form); }
}

function closeTopSheet(){
  const sheets = document.querySelectorAll('.sheet-overlay');
  if(sheets.length) sheets[sheets.length-1].remove();
}

function estoqueFilterCat(cat){
  estoqueState.filtroCat = cat;
  const container = document.getElementById('page-content');
  if(container) renderEstoqueList(container);
}

function estoqueCreate(){
  const html = renderItemForm(null);
  const sh = openSheet(html, 'Novo Item de Estoque');
  setupItemForm(sh.overlay, null, async(form)=>{
    sh.close();
    try{ await DB.createItem(form); showToast("Item adicionado! ✓"); await reloadEstoque(); }
    catch(e){ showToast(e.message,"error"); }
  });
}

function estoqueEdit(id){
  const item = estoqueState.items.find(i=>i.id===id);
  if(!item) return;
  const html = renderItemForm(item);
  const sh = openSheet(html, `Editar: ${item.nome}`);
  setupItemForm(sh.overlay, item, async(form)=>{
    sh.close();
    try{ await DB.updateItem(id, form); showToast("Item atualizado! ✓"); await reloadEstoque(); }
    catch(e){ showToast(e.message,"error"); }
  });
}

async function estoqueDelete(id){
  const item = estoqueState.items.find(i=>i.id===id);
  openConfirm(item?.nome||'item', async()=>{
    try{ await DB.deleteItem(id); showToast("Item excluído.","warning"); await reloadEstoque(); }
    catch(e){ showToast(e.message,"error"); }
  });
}

async function estoqueAdjust(id, delta){
  const item = estoqueState.items.find(i=>i.id===id);
  if(!item) return;
  const nova = Math.max(0, item.quantidade + delta);
  await DB.updateItem(id, {quantidade:nova});
  showToast(`${delta>0?'+':''}${delta} ${item.unidade}`);
  // Bell notification if dropped to/below minimum
  if(delta < 0 && nova <= item.minimo){
    addBellNotification(`⚠ Estoque baixo: ${item.nome} — ${nova} ${item.unidade} (mín. ${item.minimo})`);
  }
  await reloadEstoque();
}

async function reloadEstoque(){
  estoqueState.items = await DB.getEstoque();
  const container = document.getElementById('page-content');
  if(container && appPage==='estoque') renderEstoqueList(container);
}

    wrap.innerHTML = cats.length===0
      ? `<div style="text-align:center;padding:12px 0;font-size:12px;color:#475569">Nenhuma categoria. Crie a primeira!</div>`
      : `<div style="background:#08090b;border-radius:12px;overflow:hidden">
          ${cats.map((c,i)=>`
            <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;${i<cats.length-1?'border-bottom:1px solid #1f2130':''}">
              <div style="width:8px;height:8px;border-radius:50%;background:${catColor(c)};flex-shrink:0"></div>
              <span style="flex:1;font-size:13px;font-weight:700;color:#f1f5f9">${esc(c)}</span>
              <span style="font-size:11px;color:#475569;margin-right:6px">${estoqueState.items.filter(it=>it.categoria===c).length} itens</span>
              <button onclick="catRename('${esc(c)}')" style="width:28px;height:28px;background:transparent;border:1px solid #1f2130;border-radius:7px;color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Renomear">
                ${ICONS.pencil.replace('width="15"','width="12"').replace('height="15"','height="12"')}
              </button>
              <button onclick="catDelete('${esc(c)}')" style="width:28px;height:28px;background:transparent;border:1px solid #1f2130;border-radius:7px;color:${C.red};cursor:pointer;display:flex;align-items:center;justify-content:center" title="Excluir">
                ${ICONS.x.replace('width="20"','width="12"').replace('height="20"','height="12"')}
              </button>
            </div>`).join('')}
        </div>`;
  }

  const html = `<div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:14px">Crie e gerencie as categorias do seu estoque. As categorias são usadas para organizar os itens.</div>

    <!-- Add nova -->
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input id="cat-new-input" class="field-input" style="flex:1" placeholder="Nova categoria (ex: Hidráulico)">
      <button onclick="catAdd()" style="height:44px;padding:0 16px;background:${C.blueDim};border:1px solid ${C.blue}33;border-radius:8px;color:${C.blue};font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0">Criar</button>
    </div>

    <!-- Lista -->
    <div id="cat-list"></div>

    <!-- Restaurar padrão -->
    <button onclick="catRestoreDefaults()" style="width:100%;height:36px;margin-top:12px;background:transparent;border:1.5px dashed #1f2130;border-radius:10px;color:#475569;font-size:12px;font-weight:700;cursor:pointer">
      ↺ Restaurar categorias padrão
    </button>
  </div>`;

  openSheet(html, '🗂 Categorias do Estoque');
  renderCatList();

  // Enter key on input
  setTimeout(()=>{
    document.getElementById('cat-new-input')?.addEventListener('keydown', e=>{
      if(e.key==='Enter') catAdd();
    });
  }, 80);
}

function catColor(name){
  // Deterministic color from name
  const cols = [C.blue,C.green,C.orange,C.purple,C.yellow,C.red,'#06b6d4','#ec4899'];
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))%cols.length;
  return cols[h];
}

function catAdd(){
  const inp = document.getElementById('cat-new-input');
  const nome = inp?.value?.trim()||'';
  if(nome.length<2){ showToast('Nome muito curto','error'); return; }
  const cats = getCats();
  if(cats.find(c=>c.toLowerCase()===nome.toLowerCase())){ showToast('Categoria já existe','error'); return; }
  saveCats([...cats, nome]);
  showToast(`"${nome}" criada! ✓`);
  if(inp) inp.value='';
  // Refresh list
  const wrap=document.getElementById('cat-list');
  if(wrap){
    // Re-render inline
    const cats2=getCats();
    wrap.innerHTML=`<div style="background:#08090b;border-radius:12px;overflow:hidden">
      ${cats2.map((c,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;${i<cats2.length-1?'border-bottom:1px solid #1f2130':''}">
          <div style="width:8px;height:8px;border-radius:50%;background:${catColor(c)};flex-shrink:0"></div>
          <span style="flex:1;font-size:13px;font-weight:700;color:#f1f5f9">${esc(c)}</span>
          <span style="font-size:11px;color:#475569;margin-right:6px">${estoqueState.items.filter(it=>it.categoria===c).length} itens</span>
          <button onclick="catRename('${esc(c)}')" style="width:28px;height:28px;background:transparent;border:1px solid #1f2130;border-radius:7px;color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center">
            ${ICONS.pencil.replace('width="15"','width="12"').replace('height="15"','height="12"')}
          </button>
          <button onclick="catDelete('${esc(c)}')" style="width:28px;height:28px;background:transparent;border:1px solid #1f2130;border-radius:7px;color:${C.red};cursor:pointer;display:flex;align-items:center;justify-content:center">
            ${ICONS.x.replace('width="20"','width="12"').replace('height="20"','height="12"')}
          </button>
        </div>`).join('')}
    </div>`;
  }
}

function catDelete(nome){
  const em_uso = estoqueState.items.filter(it=>it.categoria===nome).length;
  if(em_uso>0){
    showToast(`"${nome}" está em uso (${em_uso} itens)`, 'error');
    return;
  }
  const cats = getCats().filter(c=>c!==nome);
  saveCats(cats);
  showToast(`"${nome}" excluída.`, 'warning');
  // Refresh
  const wrap=document.getElementById('cat-list');
  if(wrap){
    if(cats.length===0){
      wrap.innerHTML=`<div style="text-align:center;padding:12px 0;font-size:12px;color:#475569">Nenhuma categoria. Crie a primeira!</div>`;
    } else {
      wrap.innerHTML=`<div style="background:#08090b;border-radius:12px;overflow:hidden">
        ${cats.map((c,i)=>`
          <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;${i<cats.length-1?'border-bottom:1px solid #1f2130':''}">
            <div style="width:8px;height:8px;border-radius:50%;background:${catColor(c)};flex-shrink:0"></div>
            <span style="flex:1;font-size:13px;font-weight:700;color:#f1f5f9">${esc(c)}</span>
            <span style="font-size:11px;color:#475569;margin-right:6px">${estoqueState.items.filter(it=>it.categoria===c).length} itens</span>
            <button onclick="catRename('${esc(c)}')" style="width:28px;height:28px;background:transparent;border:1px solid #1f2130;border-radius:7px;color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center">
              ${ICONS.pencil.replace('width="15"','width="12"').replace('height="15"','height="12"')}
            </button>
            <button onclick="catDelete('${esc(c)}')" style="width:28px;height:28px;background:transparent;border:1px solid #1f2130;border-radius:7px;color:${C.red};cursor:pointer;display:flex;align-items:center;justify-content:center">
              ${ICONS.x.replace('width="20"','width="12"').replace('height="20"','height="12"')}
            </button>
          </div>`).join('')}
      </div>`;
    }
  }
}

function catRename(nome){
  const sh = openSheet(`<div>
    <div style="font-size:13px;color:#94a3b8;margin-bottom:14px">Renomear a categoria <strong style="color:#f1f5f9">"${esc(nome)}"</strong>. Todos os itens com essa categoria serão atualizados.</div>
    ${fieldHTML('Novo nome','cat-rename-input',nome,'text','',true)}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button style="flex:1;height:38px;border-radius:10px;border:1px solid #1f2130;background:transparent;color:#94a3b8;font-size:13px;font-weight:700;cursor:pointer" onclick="closeTopSheet()">Cancelar</button>
      <button style="flex:1;height:38px;border-radius:10px;border:none;background:#3b82f6;color:#fff;font-size:13px;font-weight:700;cursor:pointer" id="cat-rename-btn">Renomear</button>
    </div>
  </div>`, 'Renomear categoria');

  setTimeout(()=>{
    const inp = document.getElementById('cat-rename-input');
    if(inp){ inp.focus(); inp.select(); }
    sh.overlay.querySelector('#cat-rename-btn')?.addEventListener('click', async ()=>{
      const novo = document.getElementById('cat-rename-input')?.value?.trim()||'';
      if(novo.length<2){ showToast('Nome muito curto','error'); return; }
      if(novo===nome){ closeTopSheet(); return; }
      // Update cats list
      const cats = getCats().map(c=>c===nome?novo:c);
      saveCats(cats);
      // Update all estoque items with this category
      const estoque = LS.get('estoque');
      estoque.forEach(item=>{ if(item.categoria===nome) item.categoria=novo; });
      LS.set('estoque', estoque);
      await reloadEstoque();
      showToast(`Renomeada para "${novo}" ✓`);
      closeTopSheet(); // close rename sheet
      closeTopSheet(); // close cat manager
      setTimeout(()=> openCatManager(), 50); // reopen refreshed
    });
  }, 80);
}

function catRestoreDefaults(){
  saveCats([...CATS_DEFAULT]);
  showToast('Categorias padrão restauradas ✓');
  closeTopSheet();
  setTimeout(()=> openCatManager(), 50);
}

let equipeState = { lista:[], busca:'', filtroRole:'Todos' };

async function renderEquipePage(container){
  const lista = await DB.getUsuarios();
  equipeState.lista = lista;
  equipeState.busca = '';
  equipeState.filtroRole = 'Todos';
  renderEquipeList(container);
}

    </div>
    <div class="tab-scroll">
      ${TABS.map(t=>{
        const col=R_COLOR[t]||C.blue;
        const cnt=t==="Todos"?lista.length:lista.filter(f=>f.role===t).length;
        const lbl=t==="Todos"?"Todos":ROLES_OPT.find(r=>r.v===t)?.l||t;

      ${filtered.length===0 ? emptyHTML('Nenhum funcionário','Cadastre o primeiro membro da equipe') :

          const mesAtual = new Date().toISOString().slice(0,7);
          const epiMes = epis.filter(e=>e.data?.startsWith(mesAtual)).length;
          const isInactive = func.status_func==='desligado'||func.status_func==='afastado';
          return `<div class="card" style="overflow:hidden;opacity:${isInactive?0.7:1}">

              <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
                ${avaHTML(func,48)}
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap">
                    <div style="font-size:15px;font-weight:800;color:#f1f5f9">${esc(func.nome)}</div>

function equipeFilterRole(role){
  equipeState.filtroRole = role;
  const container = document.getElementById('page-content');
  if(container) renderEquipeList(container);
}

function equipeCreate(){
  const html = renderFuncForm(null);
  const sh = openSheet(html, 'Cadastrar Funcionário');
  setupFuncForm(sh.overlay, null, async(form)=>{
    sh.close();
    try{ await DB.createUsuario(form); showToast("Funcionário cadastrado! ✓"); await reloadEquipe(); }
    catch(e){ showToast(e.message,"error"); }
  });
}

function equipeEdit(id){
  const func = equipeState.lista.find(f=>f.id===id);
  if(!func) return;
  const html = renderFuncForm(func);
  const sh = openSheet(html, `Editar: ${func.nome.split(" ")[0]}`);
  setupFuncForm(sh.overlay, func, async(form)=>{
    sh.close();
    try{
      const u={...form};if(!u.senha)delete u.senha;
      await DB.updateUsuario(id,u); showToast("Dados atualizados! ✓"); await reloadEquipe();
    }catch(e){ showToast(e.message,"error"); }
  });
}

async function equipeDelete(id){
  const func = equipeState.lista.find(f=>f.id===id);
  openConfirm(func?.nome||'funcionário', async()=>{
    try{ await DB.deleteUsuario(id); showToast("Funcionário excluído.","warning"); await reloadEquipe(); }
    catch(e){ showToast(e.message,"error"); }
  });
}

async function equipeToggle(id){
  const func = equipeState.lista.find(f=>f.id===id);
  if(!func) return;
  await DB.updateUsuario(id, {ativo:!func.ativo});
  showToast(func.ativo?`${func.nome.split(" ")[0]} desativado.`:`${func.nome.split(" ")[0]} reativado! ✓`, func.ativo?"warning":"success");
  await reloadEquipe();
}

function equipeDetail(id){
  const func = equipeState.lista.find(f=>f.id===id);
  if(!func) return;
  const isAdmin = appUser.role==='admin';
  const rows = [
    {l:"Nome",v:func.nome},{l:"Matrícula",v:func.matricula||"—"},{l:"Cargo",v:func.cargo||"—"},
    {l:"Função",v:ROLES_OPT.find(r=>r.v===func.role)?.l||func.role},{l:"Telefone",v:func.telefone||"—"},
    {l:"E-mail",v:func.email},{l:"Status",v:func.ativo?"Ativo":"Inativo"}
  ];
  const html = `<div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:24px">
      <div id="det-ava">${avaHTML(func,80)}</div>
      ${isAdmin?`<input type="file" accept="image/*" id="det-avatar-input" style="display:none">
        <button onclick="document.getElementById('det-avatar-input').click()" style="height:36px;padding:0 14px;background:${C.blueDim};border:1px solid ${C.blue}33;border-radius:10px;color:${C.blue};font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
          ${ICONS.camera} Trocar foto
        </button>`:''}
    </div>
    ${rows.map((r,i,a)=>`<div class="detail-row">
      <span class="detail-label">${esc(r.l)}</span>
      <span class="detail-value" style="color:${r.l==='Status'?(func.ativo?C.green:C.red):'#f1f5f9'}">${esc(r.v)}</span>
    </div>`).join('')}
  </div>`;
  const sh = openSheet(html, 'Perfil');
  if(isAdmin){
    sh.overlay.querySelector('#det-avatar-input')?.addEventListener('change', async e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=async ev=>{
        await DB.updateUsuario(id,{avatar:ev.target.result});
        const avaWrap=sh.overlay.querySelector('#det-ava');
        if(avaWrap) avaWrap.innerHTML=avaHTML({...func,avatar:ev.target.result},80);
        showToast("Foto atualizada! ✓");
        await reloadEquipe();
      };
      r.readAsDataURL(f);
    });
  }
}

async function reloadEquipe(){
  equipeState.lista = await DB.getUsuarios();
  const container = document.getElementById('page-content');
  if(container && appPage==='equipe') renderEquipeList(container);
}

let _funcSaveCallback = null;
let _ffStatusSel = 'ativo';

function ffStatusSelect(v){
  _ffStatusSel = v;
  document.querySelectorAll('[data-sf]').forEach(btn=>{
    const s = STATUS_FUNC.find(x=>x.v===btn.getAttribute('data-sf'));
    if(!s) return;
    const sel = s.v===v;
    btn.style.background = sel ? s.c+'22' : 'transparent';
    btn.style.borderColor = sel ? s.c : '#1f2130';
    btn.style.color = sel ? s.c : '#94a3b8';
    const dot = btn.querySelector('span');
    if(dot) dot.style.background = sel ? s.c : '#475569';
  });
}

function setupFuncForm(overlay, init, onSave){
  _funcSaveCallback = onSave;
  _ffStatusSel = init?.status_func||'ativo';
  const isEdit = !!init?.id;
  overlay.querySelector('#ff-save-btn')?.addEventListener('click', ()=>{
    const nome=document.getElementById('ff-nome')?.value?.trim()||'';
    const email=document.getElementById('ff-email')?.value?.trim()||'';
    const senha=document.getElementById('ff-senha')?.value||'';
    if(nome.length<3){ showToast('Nome muito curto','error'); return; }
    if(!email.includes('@')){ showToast('E-mail inválido','error'); return; }
    if(!isEdit && senha.length<4){ showToast('Senha muito curta','error'); return; }
    const form={
      nome, email, senha,
      role: document.getElementById('ff-role')?.value||'tecnico',
      cargo: document.getElementById('ff-cargo')?.value||'',
      telefone: document.getElementById('ff-tel')?.value||'',
      matricula: document.getElementById('ff-mat')?.value||'',
      status_func: _ffStatusSel,
      // ativo = true se não for desligado/afastado, para retrocompat
      ativo: _ffStatusSel !== 'desligado',
    };
    if(_funcSaveCallback) _funcSaveCallback(form);
  });
}

// ── EPI / EQUIPAMENTOS ──
function equipeEPI(id){
  const func = equipeState.lista.find(f=>f.id===id);
  if(!func) return;
  const isAdmin = appUser.role==='admin';
  const epis = func.epis||[];
  const agora = new Date();
  const mesAtual = agora.toISOString().slice(0,7); // YYYY-MM

  function renderEPIList(){
    const wrap = document.getElementById('epi-list');
    if(!wrap) return;
    if(epis.length===0){
      wrap.innerHTML=`<div style="text-align:center;padding:16px 0;font-size:12px;color:#475569">Nenhum item registrado ainda.</div>`;
      return;
    }
    // Group by month
    const byMonth={};
    epis.forEach(e=>{
      const m=e.data?.slice(0,7)||'—';
      if(!byMonth[m]) byMonth[m]=[];
      byMonth[m].push(e);
    });
    wrap.innerHTML = Object.keys(byMonth).sort().reverse().map(m=>{
      const label = m==='—' ? 'Sem data' : new Date(m+'-01').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      const isMes = m===mesAtual;
      return `<div style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-size:11px;font-weight:700;color:${isMes?C.blue:'#94a3b8'};text-transform:uppercase;letter-spacing:0.06em">${label}</div>
          ${isMes?`<span style="background:${C.blueDim};color:${C.blue};border-radius:5px;padding:1px 6px;font-size:10px;font-weight:700">Mês atual</span>`:''}
        </div>
        <div style="background:#08090b;border-radius:10px;overflow:hidden">
          ${byMonth[m].map((e,i,a)=>`
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;${i<a.length-1?'border-bottom:1px solid #1f2130':''}">
              <div style="width:34px;height:34px;border-radius:9px;background:${C.blueDim};border:1px solid ${C.blue}33;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${epiEmoji(e.categoria)}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:700;color:#f1f5f9">${esc(e.nome)}</div>
                <div style="font-size:11px;color:#94a3b8">${esc(e.categoria||'—')} · Qtd: ${e.qtd||1}</div>
              </div>
              ${isAdmin?`<button onclick="epiRemover('${id}','${e.id}')" style="width:28px;height:28px;background:transparent;border:1px solid #1f2130;border-radius:8px;color:${C.red};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ICONS.x.replace('width="20"','width="12"').replace('height="20"','height="12"')}</button>`:''}
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  const html = `<div>
    <!-- Resumo do mês -->
    <div style="background:${C.blueDim};border:1px solid ${C.blue}33;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
      ${avaHTML(func,44)}
      <div>
        <div style="font-size:14px;font-weight:800;color:#f1f5f9">${esc(func.nome)}</div>
        <div style="font-size:12px;color:${C.blue};margin-top:2px">
          ${epis.filter(e=>e.data?.startsWith(mesAtual)).length} item(ns) retirado(s) este mês
        </div>
      </div>
    </div>

    <!-- Formulário add (só admin) -->
    ${isAdmin?`<div style="background:#08090b;border-radius:12px;padding:14px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">+ Registrar retirada</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        ${fieldHTML('Item *','epi-nome','','text','Ex: Capacete, Luva')}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          ${selHTML('Categoria','epi-cat','EPI',EPI_CATS.map(c=>({v:c,l:c})))}
          ${fieldHTML('Qtd','epi-qtd','1','number','')}
        </div>
      </div>
      ${fieldHTML('Data','epi-data',new Date().toISOString().slice(0,10),'date','')}
      <button onclick="epiAdicionar('${id}')" style="width:100%;height:36px;background:${C.blueDim};border:1px solid ${C.blue}33;border-radius:10px;color:${C.blue};font-size:13px;font-weight:700;cursor:pointer;margin-top:4px">Registrar</button>
    </div>`:''}

    <!-- Lista -->
    <div id="epi-list"></div>
  </div>`;

  openSheet(html, `🦺 EPIs / Equipamentos — ${func.nome.split(' ')[0]}`);
  renderEPIList();
}

function epiEmoji(cat){
  const m={EPI:'🦺',Ferramenta:'🔧',Equipamento:'⚙️',Uniforme:'👕',Outro:'📦'};
  return m[cat]||'📦';
}

async function epiAdicionar(funcId){
  const nome = document.getElementById('epi-nome')?.value?.trim()||'';
  if(!nome){ showToast('Informe o item','error'); return; }
  const qtd = parseInt(document.getElementById('epi-qtd')?.value)||1;
  const cat = document.getElementById('epi-cat')?.value||'EPI';
  const data = document.getElementById('epi-data')?.value||new Date().toISOString().slice(0,10);
  const func = equipeState.lista.find(f=>f.id===funcId);
  if(!func) return;
  const novo = {id:uid(), nome, categoria:cat, qtd, data};
  const epis = [...(func.epis||[]), novo];
  await DB.updateUsuario(funcId, {epis});
  showToast(`${nome} registrado! ✓`);
  await reloadEquipe();
  // Refresh panel
  closeTopSheet();
  setTimeout(()=> equipeEPI(funcId), 100);
}

async function epiRemover(funcId, epiId){
  const func = equipeState.lista.find(f=>f.id===funcId);
  if(!func) return;
  const epis = (func.epis||[]).filter(e=>e.id!==epiId);
  await DB.updateUsuario(funcId, {epis});
  showToast('Item removido.','warning');
  await reloadEquipe();
  closeTopSheet();
  setTimeout(()=> equipeEPI(funcId), 100);
}

// ── QR HASH NAVIGATION ──
function checkQRHash(){
  const m = window.location.hash.match(/^#os=(.+)$/);
  if(!m) return false;
  const h = m[1];
  try {
    const p=JSON.parse(decodeURIComponent(escape(atob(h))));
    const os={numero:p.n,titulo:p.t,descricao:p.d,prioridade:p.p,status:p.s,equipe:p.e,criada:p.c,atualizada:p.u};
    renderPublicOS(os);
    return true;
  } catch(e) {
    renderPublicOSError();
    return true;
  }
}

function renderPublicOS(os){
  const app=document.getElementById('app');
  const sc=(S_MAP[os.status]||{}).c||C.sub;
  const SI={"Concluída":"✅","Em Andamento":"🔧","Planejada":"📋","Aguardando":"⏳","Cancelada":"❌"};
  app.innerHTML=`<div style="min-height:100vh;background:#08090b;font-family:system-ui,sans-serif;color:#f1f5f9">
    <div style="background:#101115;border-bottom:1px solid #1f2130;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10">
      ${brandHTML(true)}
      <button onclick="backFromPublic()" style="height:36px;padding:0 14px;background:${C.blueDim};border:1px solid ${C.blue}33;border-radius:10px;color:${C.blue};font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
        ${ICONS.externalLink} Fazer login
      </button>
    </div>
    <div style="max-width:480px;margin:0 auto;padding:24px 20px 40px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:56px;margin-bottom:10px">${SI[os.status]||"📋"}</div>
        <div style="display:inline-flex;background:${sc}22;border:1px solid ${sc}44;border-radius:20px;padding:7px 22px">
          <span style="font-size:15px;font-weight:800;color:${sc}">${esc(os.status)}</span>
        </div>
      </div>
      <div class="card" style="padding:20px;margin-bottom:14px">
        <div style="font-size:12px;color:#3b82f6;font-weight:700;margin-bottom:6px">${esc(os.numero)}</div>
        <div style="font-size:19px;font-weight:800;color:#f1f5f9;line-height:1.3;margin-bottom:12px">${esc(os.titulo)}</div>
        <div style="display:flex;gap:8px;margin-bottom:${os.descricao?'16':'0'}px">${badgeHTML(os.prioridade)}${badgeHTML(os.status)}</div>
        ${os.descricao?`<div style="font-size:13px;color:#94a3b8;line-height:1.7;background:#08090b;border-radius:10px;padding:12px 14px;margin-top:12px">${esc(os.descricao)}</div>`:''}
      </div>
      ${os.equipe?.length>0?`<div class="card" style="padding:16px 20px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px">👷 Equipe responsável</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${os.equipe.map(m=>`<div style="display:flex;align-items:center;gap:12px">
            <div style="width:40px;height:40px;border-radius:11px;background:${C.blueDim};border:1px solid ${C.blue}33;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${C.blue};flex-shrink:0">
              ${esc(m.nome.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase())}
            </div>
            <div>
              <div style="font-size:14px;font-weight:700;color:#f1f5f9">${esc(m.nome)}</div>
              <div style="font-size:11px;color:#94a3b8;text-transform:capitalize">${esc(m.cargo)}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>`:''}
      <div class="card" style="overflow:hidden">
        ${[{label:"Criada em",value:fmt(os.criada)},{label:"Atualizada em",value:fmt(os.atualizada)}].map((r,i)=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 20px;${i===0?'border-bottom:1px solid #1f2130':''}">
            <span style="font-size:12px;color:#94a3b8">${r.label}</span>
            <span style="font-size:13px;font-weight:700;color:#f1f5f9">${r.value}</span>
          </div>`).join('')}
      </div>
      <div style="text-align:center;margin-top:28px;font-size:11px;color:#475569">Vexor Cloud · Sistema de Gestão Industrial</div>
    </div>
  </div>`;
}

function renderPublicOSError(){
  const app=document.getElementById('app');
  app.innerHTML=`<div style="min-height:100vh;background:#08090b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;font-family:system-ui,sans-serif">
    <div style="font-size:48px">❌</div>
    <div style="font-size:18px;font-weight:700;color:#f1f5f9">Link inválido</div>
    <div style="font-size:13px;color:#94a3b8">Os dados da OS não puderam ser lidos.</div>
    <button onclick="backFromPublic()" style="height:56px;padding:0 28px;background:#3b82f6;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer">Abrir o sistema</button>
  </div>`;
}

function backFromPublic(){
  window.location.hash = '';
  appUser = null;
  renderLogin();
}

// ── INIT ──
seedDB();
if(!checkQRHash()){
  restoreSession();
}

async function restoreSession(){
  try {
    const { data } = await window._vxSupa.auth.getSession();
    if (data.session && data.session.user) {
      const meta = data.session.user.user_metadata || {};
      appUser = {
        id: data.session.user.id,
        nome: meta.full_name || data.session.user.email.split('@')[0],
        email: data.session.user.email,
        role: meta.role || 'admin',
        ativo: true,
        avatar: null,
        cargo: meta.cargo || 'Administrador'
      };
      renderApp();
      return;
    }
  } catch(e) { console.error('restore session error:', e); }
  renderLogin();
}

window.addEventListener('hashchange', ()=>{
  if(!checkQRHash() && !appUser){ renderLogin(); }
});
window.addEventListener('resize', ()=>{
  if(appUser) renderApp();
});

// ── SERVICE WORKER (PWA) ──
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
